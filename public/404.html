<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecionando...</title>
    <script>
      (function () {
        var loc = window.location;
        var path = loc.pathname === "/" ? "/" : loc.pathname;
        var target = "/#" + path + loc.search + loc.hash;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
